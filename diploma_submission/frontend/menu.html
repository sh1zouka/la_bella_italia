<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Меню — La Bella Italia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="menu">
  <script>setTimeout(()=>{const l=document.getElementById("page-loader");if(l)l.remove();},3000);</script>
  <div id="page-loader"><div class="loader-logo">🍕</div><div class="loader-spinner"></div><div class="loader-text">Загрузка...</div></div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo"><span class="logo-icon">🍕</span> La Bella Italia</a>
      <div class="navbar-nav">
        <a href="index.html">Главная</a>
        <a href="menu.html" class="active">Меню</a>
      </div>
      <div class="navbar-right">
        <div class="nav-auth">
          <a href="auth.html" class="btn-nav-auth btn-login">Войти</a>
          <a href="auth.html" class="btn-nav-auth btn-register">Регистрация</a>
        </div>
        <div class="nav-user" style="display:none">
          <span class="bonus-badge">0 бонусов</span>
          <a href="profile.html" class="nav-user-name" id="nav-username">Профиль</a>
          <a href="admin.html" class="nav-admin-link" style="display:none">Админ</a>
          <button class="btn-logout" onclick="logout()">Выйти</button>
        </div>
        <a href="cart.html" class="btn-cart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Корзина
          <span class="cart-badge" style="display:none">0</span>
        </a>
      </div>
        <button class="burger" id="burger-btn" aria-label="Меню"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <div class="mobile-menu-inner">
      <a href="index.html">🏠 Главная</a>
      <a href="menu.html" class="active">🍕 Меню</a>
      <div class="mobile-menu-divider"></div>
      <a href="cart.html">🛒 Корзина <span class="cart-badge" style="display:none;position:relative;top:0;right:0;margin-left:4px">0</span></a>
      <div id="mobile-auth-links">
        <a href="auth.html">Войти</a>
        <a href="auth.html">Регистрация</a>
      </div>
      <div id="mobile-user-links" style="display:none">
        <a href="profile.html">👤 Профиль</a>
        <a href="admin.html" id="mobile-admin-link" style="display:none">⚙️ Админ</a>
        <button onclick="logout()">Выйти</button>
      </div>
    </div>
  </div>

  <div class="page-header">
    <div class="page-header-inner">
      <h1>Наше меню</h1>
      <p>Свежие блюда итальянской кухни с доставкой за 40 минут</p>
    </div>
  </div>

  <section class="section">
    <div class="section-inner">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.75rem">
        <div class="cat-tabs">
          <button class="cat-tab active" data-cat="all">Все</button>
          <button class="cat-tab" data-cat="pizza">🍕 Пицца</button>
          <button class="cat-tab" data-cat="pasta">🍝 Паста</button>
          <button class="cat-tab" data-cat="starters">🥗 Закуски</button>
          <button class="cat-tab" data-cat="desserts">🍰 Десерты</button>
          <button class="cat-tab" data-cat="drinks">🥤 Напитки</button>
        </div>
        <div class="menu-search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="menu-search" placeholder="Поиск блюда...">
        </div>
      </div>
      <div id="menu-container"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-bottom" style="max-width:1240px;margin:0 auto;border-top:none;padding-top:0">
      <span>© 2026 La Bella Italia</span>
      <span>Доставка ежедневно 10:00–23:00</span>
    </div>
  </footer>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
