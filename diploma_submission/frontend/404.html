<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>404 — Страница не найдена | La Bella Italia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: calc(100vh - 64px);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .error-inner { max-width: 480px; animation: fadeInUp 0.6s ease both; }
    .error-code {
      font-size: clamp(5rem, 15vw, 9rem); font-weight: 800;
      color: var(--red); line-height: 1; letter-spacing: -4px;
      opacity: 0.15; margin-bottom: -1rem;
    }
    .error-emoji { font-size: 4rem; margin-bottom: 1rem; }
    .error-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
    .error-desc { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
    .error-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo"><span class="logo-icon">🍕</span> La Bella Italia</a>
      <div class="navbar-right">
        <a href="cart.html" class="btn-cart">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Корзина
        </a>
      </div>
    </div>
  </nav>

  <div class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <div class="error-emoji">🍕</div>
      <h1 class="error-title">Страница не найдена</h1>
      <p class="error-desc">Похоже, эта страница уехала вместе с курьером. Вернитесь на главную или загляните в меню.</p>
      <div class="error-actions">
        <a href="index.html" class="btn-primary">На главную</a>
        <a href="menu.html" class="btn-secondary">Смотреть меню</a>
      </div>
    </div>
  </div>
</body>
</html>
