# Render.com deployment configuration for La Bella Italia
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: la-bella-italia
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    healthCheckPath: /api/menu
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: la-bella-italia-db
          property: connectionString

databases:
  - name: la-bella-italia-db
    region: frankfurt
    plan: free
    databaseName: italian_delivery
    ipAllowList: []
